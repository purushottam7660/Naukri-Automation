name: Naukri Automation (Stable Chrome CI)

on:
  schedule:
    - cron: '30 2,3,8,9 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      # ==========================
      # Checkout repo
      # ==========================
      - name: Checkout code
        uses: actions/checkout@v4

      # ==========================
      # Setup Python
      # ==========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ==========================
      # Install dependencies
      # ==========================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install selenium

      # ==========================
      # Install Chrome (IMPORTANT FIX)
      # ==========================
      - name: Install Chrome
        run: |
          choco install googlechrome -y

      # ==========================
      # Create folders
      # ==========================
      - name: Create folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force screenshots
          New-Item -ItemType Directory -Force html_dump
          New-Item -ItemType Directory -Force Naukri_resume

      # ==========================
      # Run script
      # ==========================
      - name: Run Automation Script
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri.py

      # ==========================
      # Upload logs
      # ==========================
      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug-files
          path: |
            screenshots/
            html_dump/
            Naukri_resume/
            naukri.log
