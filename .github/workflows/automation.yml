name: Naukri Automation (Firefox)

on:
  schedule:
    - cron: '30 2,3,8,9 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      # =====================================================
      # Checkout repo
      # =====================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================================================
      # Setup Python
      # =====================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # =====================================================
      # Install dependencies
      # =====================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =====================================================
      # Ensure folders exist
      # =====================================================
      - name: Create required folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force screenshots
          New-Item -ItemType Directory -Force html_dump
          New-Item -ItemType Directory -Force Naukri_resume

      # =====================================================
      # Debug: Firefox + GeckoDriver
      # =====================================================
      - name: Check Firefox & GeckoDriver
        shell: powershell
        run: |
          Write-Host "Checking Firefox version..."
          firefox --version

          Write-Host "Checking GeckoDriver..."
          geckodriver --version

      # =====================================================
      # Run automation script
      # =====================================================
      - name: Run Automation Script
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
        run: python naukri.py

      # =====================================================
      # Upload logs + debug files (ALWAYS)
      # =====================================================
      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-debug-files
          path: |
            screenshots/
            html_dump/
            Naukri_resume/
            naukri.log
